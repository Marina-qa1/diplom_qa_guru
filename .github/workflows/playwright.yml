name: E2E
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        
      - name: Установка Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          
      - name: Установка пакетов
        run: npm i
        
      - name: Устанавливаем браузеры
        run: npx playwright install --with-deps
        
      - name: Запускаем тесты
        run: npm t
        
      - name: Запускаем генерацию allure в одном файле
        run: npm run allureFile
        if: always()
        continue-on-error: true

      # Сохраняем результаты Allure 
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: allure-results
          path: allure-results
          retention-days: 20
          
      # Забираем результаты предыдущего запуска  
      - uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
          
      # Формируем из allure-results отчёт allure-report
      - uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20
      
      - name: Install Allurectl
        if: hashFiles('allure-results/*.json') != ''
        run: |
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/allure-framework/allurectl/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64")) | .browser_download_url')
          echo "Downloading allurectl from $DOWNLOAD_URL"
          curl -sLo allurectl "$DOWNLOAD_URL"
          chmod +x allurectl
          sudo mv allurectl /usr/local/bin/
          allurectl --version

      - name: Create Allure TestOps launch
        if: hashFiles('allure-results/*.json') != ''
        id: create_launch
        run: |
          LAUNCH_ID=$(allurectl launch create \
            --launch-name "Tests - Build #${{ github.run_number }}" \
            --launch-tags "ci,github-actions" \
            --project-id ${{ secrets.ALLURE_PROJECT_ID }} \
            --endpoint ${{ secrets.ALLURE_ENDPOINT }} \
            --token ${{ secrets.ALLURE_TOKEN }} \
            --no-header \
            -o json | jq -r '.[0].id')
          echo "LAUNCH_ID=$LAUNCH_ID" >> $GITHUB_ENV

      - name: Upload results to Allure TestOps
        if: hashFiles('allure-results/*.json') != '' && env.LAUNCH_ID != ''
        run: |
          allurectl upload allure-results \
            --launch-id $LAUNCH_ID \
            --project-id ${{ secrets.ALLURE_PROJECT_ID }} \
            --endpoint ${{ secrets.ALLURE_ENDPOINT }} \
            --token ${{ secrets.ALLURE_TOKEN }}
        

      - name: Notify Telegram
  if: always()
  env:
    TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  run: |
    # Если у вас есть allure results
    if [ -d "allure-results" ]; then
      TOTAL=$(find allure-results -name "*.json" | wc -l || echo "0")
      PASSED=$(grep -r '"status":"passed"' allure-results | wc -l || echo "0")
      FAILED=$(grep -r '"status":"failed"' allure-results | wc -l || echo "0")
      SKIPPED=$(grep -r '"status":"skipped"' allure-results | wc -l || echo "0")
    else
      TOTAL="N/A"
      PASSED="N/A" 
      FAILED="N/A"
      SKIPPED="N/A"
    fi
    
    STATUS=${{ job.status }}
    if [ "$STATUS" = "success" ]; then
      EMOJI="🎉"
      STATUS_TEXT="УСПЕХ"
    else
      EMOJI="🚨" 
      STATUS_TEXT="НЕУДАЧА"
    fi

    MESSAGE="$EMOJI *$STATUS_TEXT* $EMOJI%0A\
    📊 *Статистика тестов:*%0A\
    ▫️ Всего: *$TOTAL*%0A\
    ✅ Успешные: *$PASSED*%0A\
    ❌ Провалено: *$FAILED*%0A\
    ⏭️ Пропущено: *$SKIPPED*%0A\
    ━━━━━━━━━━━━━━━━━%0A\
    🔗 [Allure отчет](https://github.com/Marina-qa1/diplom_qa_guru/)%0A\
    🏷️ *Run #${{ github.run_number }}*"

    curl -s -X POST "https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage" \
      -d "chat_id=$TELEGRAM_CHAT_ID" \
      -d "parse_mode=Markdown" \
      -d "text=$MESSAGE"
