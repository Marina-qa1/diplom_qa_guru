name: Playwright CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ci-tests:
    name: 🧪 Run & Report
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
      # 1. Получаем код из репозитория
      - name: 🔎 Checkout code
        uses: actions/checkout@v4

      # 2. Устанавливаем Node.js и кэшируем зависимости
      - name: 📦 Setup Node.js & Cache
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # 3. Устанавливаем зависимости
      - name: 📥 Install dependencies
        run: npm ci

      # 4. Устанавливаем Playwright и браузеры
      - name: 🌐 Install Playwright
        run: npx playwright install --with-deps

      # 5. Запуск всех тестов
      - name: ▶️ Execute tests
        run: npm run test

      # 6. Подготавливаем историю для Allure
      - name: 🗃️ Fetch previous reports
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages
          token: ${{ secrets.GITHUB_TOKEN }}

      # 7. Генерируем HTML-отчёт
      - name: 📊 Generate Allure Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20

      # 8. Публикуем отчёт на GitHub Pages
      - name: 🌐 Deploy Allure Report
        uses: peaceiris/actions-gh-pages@v4
        if: always()
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      # 9. Загружаем результаты в Allure TestOps
      - name: ☁️ Upload to Allure TestOps
        if: always()
        uses: automatictester/allure-testops-action@v2
        with:
          allure-testops-url: https://allure.autotests.cloud
          allure-testops-project: 5005
          allure-testops-token: ${{ secrets.ALLURE_TOKEN }}
          allure-results: allure-results

      # 10. Сохраняем артефакты
      - name: 📁 Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            test-results
            allure-results
          retention-days: 20

      # 11. Извлекаем статистику из отчёта
      - name: 📋 Parse test summary
        id: parse_summary
        if: always()
        run: |
          file="allure-report/widgets/summary.json"
          if [ -f "$file" ]; then
            echo "PASSED=$(jq -r '.statistic.passed' $file)" >> $GITHUB_ENV
            echo "FAILED=$(jq -r '.statistic.failed' $file)" >> $GITHUB_ENV
            echo "SKIPPED=$(jq -r '.statistic.skipped' $file)" >> $GITHUB_ENV
            echo "TOTAL=$(jq -r '.statistic.total' $file)" >> $GITHUB_ENV
          fi

     
