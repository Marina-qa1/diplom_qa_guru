name: E2E
# Когда запускаем
on:
  push:
    branches:
      - main
  workflow_dispatch:
# Описываем джобы
jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Установка Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
      - name: Установка пакетов
        run: npm i
      - name: Устанавливаем браузеры
        run: npx playwright install --with-deps
      - name: Запускаем тесты
        run: npm t
      - name: Запускаем генерацию allure в одном файле
        run: npm run allureFile
        if: always()
        continue-on-error: true
# Сохраняем результаты Allure 
      - uses: actions/upload-artifact@v4
        if: always()
        continue-on-error: true
        with:
          name: allure-results
          path: allure-results
          retention-days: 20
      # Забираем результаты предыдущего запуска  
      - uses: actions/checkout@v4
        if: always()
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages
      # Формируем из allure-results отчёт allure-report
      - uses: simple-elf/allure-report-action@master
        if: always()
        id: allure-report
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: 20
      # Деплоим отчёт
      - name: deploy report
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: allure-history

      - name: Install allurectl
        run: |
          curl -o allurectl -L "https://github.com/allure-framework/allurectl/releases/latest/download/allurectl_linux_amd64"
          chmod +x allurectl
          sudo mv allurectl /usr/local/bin/

      - name: Upload results to Allure TestOps
        if: always()
        run: |
          allurectl upload allure-results \
            --endpoint https://allure.autotests.cloud \
            --project-id 5005 \
            --token ${{ secrets.ALLURE_TOKEN }} \
            --launch-name "GitHub Run #${{ github.run_number }}"

      - name: Parse Allure summary
        id: parse_summary
        if: always()
        run: |
          SUMMARY_FILE="allure-report/widgets/summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            PASSED=$(jq '.statistic.passed' $SUMMARY_FILE)
            FAILED=$(jq '.statistic.failed' $SUMMARY_FILE)
            SKIPPED=$(jq '.statistic.skipped' $SUMMARY_FILE)
            TOTAL=$(jq '.statistic.total' $SUMMARY_FILE)
            echo "PASSED=$PASSED" >> $GITHUB_ENV
            echo "FAILED=$FAILED" >> $GITHUB_ENV
            echo "SKIPPED=$SKIPPED" >> $GITHUB_ENV
            echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          fi

      - name: Notify Telegram
        if: always()
        run: |
          STATUS=${{ job.status }}
          if [ "$STATUS" = "success" ]; then
            EMOJI="🎉"
            STATUS_TEXT="УСПЕХ"
          else
            EMOJI="🚨" 
            STATUS_TEXT="НЕУДАЧА"
          fi
    
          MESSAGE="$EMOJI *$STATUS_TEXT* $EMOJI%0A\
          ━━━━━━━━━━━━━━━━━%0A\
          📊 *Статистика тестов:*%0A\
          ▫️ Всего пройдено: *$TOTAL*%0A\
          ✅ Успешные: *$PASSED*%0A\
          ❌ Провалено: *$FAILED*%0A\
          ⏭️ Пропущено: *$SKIPPED*%0A\
          ━━━━━━━━━━━━━━━━━%0A\
          🔗 [Allure отчет](https://github.com/Marina-qa1/diplom_qa_guru/)%0A\
          🧪 [Allure TestOps](https://allure.autotests.cloud/launch/49653)%0A\
          📦 [Артефакты](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})%0A\
          ━━━━━━━━━━━━━━━━━%0A\
          🏷️ *Run #${{ github.run_number }}*"

          curl -s -X POST https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage \
          -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} \
          -d parse_mode=Markdown \
          -d text="$MESSAGE"
